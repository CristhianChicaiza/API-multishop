version: '3.8'

services:
  postgres:
    image: postgres:13.5
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: postgres_dbp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

volumes:
  postgres_data:
